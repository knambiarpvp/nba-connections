name: Build and Release

# On pull_request (opened / updated): runs the build jobs only (smoke-test).
# On push to main: also bumps the semver tag and publishes a GitHub Release.
#
# Conventional commit prefixes control the version bump:
#   feat:            → minor  (1.x.0)
#   fix: / chore:    → patch  (1.0.x)
#   feat!: or a commit footer containing "BREAKING CHANGE" → major (x.0.0)
# Any other message defaults to a patch bump.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write   # required to push tags and create releases

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Determine the next semantic version and push the git tag.
  # ─────────────────────────────────────────────────────────────────────────
  version:
    name: Determine version
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # full history needed for tag inspection

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch       # fallback bump type when no conventional prefix

  # ─────────────────────────────────────────────────────────────────────────
  # 2a. Build — Windows x86_64
  # ─────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build (Windows x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: src/compile/requirements.txt

      - name: Install dependencies + PyInstaller
        run: pip install -r src/compile/requirements.txt pyinstaller

      - name: Build executable
        run: python -m PyInstaller --clean --noconfirm --distpath dist --workpath build src/compile/nba_connections.spec

      - name: Zip artifact
        shell: pwsh
        run: Compress-Archive -Path dist/nba-connections/* -DestinationPath nba-connections-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: nba-connections-windows.zip
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # 2b. Build — macOS arm64 (Apple Silicon; Intel runs via Rosetta 2)
  # ───────────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build (macOS arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: src/compile/requirements.txt

      - name: Install dependencies + PyInstaller
        run: pip install -r src/compile/requirements.txt pyinstaller

      - name: Build executable
        run: python -m PyInstaller --clean --noconfirm --distpath dist --workpath build src/compile/nba_connections.spec

      - name: Zip artifact
        run: zip -r nba-connections-macos.zip dist/nba-connections/

      - uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: nba-connections-macos.zip
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Create GitHub Release and attach both zips.
  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: Publish release
    if: github.event_name == 'push'
    needs: [version, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-zip

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          name: Release ${{ needs.version.outputs.new_tag }}
          generate_release_notes: true
          files: |
            nba-connections-windows.zip
            nba-connections-macos.zip
